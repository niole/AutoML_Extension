[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    slow: marks tests as slow (AutoGluon training, may take minutes)
    domino: marks tests that require a live Domino environment
    mlflow: marks tests that require MLflow tracking
    integration: marks end-to-end integration tests against a live service

# Test report output — use conftest.py hook for dynamic filename with timestamp
addopts =
    -v
    --tb=short
    --self-contained-html
    -p no:warnings
